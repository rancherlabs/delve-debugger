apiVersion: v1
kind: Pod
metadata:
  name: delve-test-target
  labels:
    app: delve-test-target
spec:
  containers:
    - name: target
      image: delve-debugger-test-target:latest
      imagePullPolicy: Never
      securityContext:
        # ensure ptrace is possible within the pod
        capabilities:
          add: ["SYS_PTRACE"]
